version: 2

models:
  - name: base__hl_transactions
    description: >
      Base view on the raw HL transactions table. Adds three derived columns
      (is_trade, is_contribution, unit_direction) that encode HL-specific business
      rules in one place, removing the repeated CASE expressions from downstream models.

      **Grain**: One row per transaction_id
      **Source**: hl_dashboard.transactions (raw ingest)
    columns:
      - name: transaction_id
        description: "MD5 of (account_id | trade_date | reference | value_gbp). Natural deduplication key — not a sequential integer surrogate."
        tests:
          - not_null
          - unique
      - name: account_id
        description: "ISA or SIPP."
        tests:
          - not_null
      - name: fund_id
        description: "ISIN of the fund; NULL for non-trade rows."
      - name: trade_date
        description: "Date the trade was executed."
        tests:
          - not_null
      - name: transaction_type
        description: "Classified transaction type."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [BUY, SELL, SWITCH_IN, SWITCH_OUT, CONTRIBUTION, FEE,
                         INTEREST, REBATE, TRANSFER, REJECTED, OTHER]
      - name: value_gbp
        description: "Transaction value in GBP. Negative = debit (purchase/fee); positive = credit."
        tests:
          - not_null
      - name: is_trade
        description: "True for BUY, SELL, SWITCH_IN, SWITCH_OUT rows — the ones that change unit balances."
        tests:
          - not_null
      - name: is_contribution
        description: "True for CONTRIBUTION and TRANSFER rows."
        tests:
          - not_null
      - name: unit_direction
        description: >
          +1 when value_gbp < 0 (money out = units in; a purchase).
          -1 when value_gbp >= 0 (money in = units out; a sale).
          Multiply by quantity to get the signed unit delta.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, -1]
