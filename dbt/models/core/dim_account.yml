version: 2

models:
  - name: dim_account
    description: >
      Account dimension. One row per account (ISA, SIPP).

      **Table type**: Dimension
      **Grain**: One row per account_name
      **Update Frequency**: Static — only two accounts exist
      **Source**: hl_dashboard.accounts
    columns:
      - name: account_key
        description: "Hash surrogate key generated via dbt_utils.generate_surrogate_key(['a.id']), where a.id is the raw account identifier from the accounts source table. Use this for all joins between fact tables and dim_account."
        tests:
          - not_null
          - unique
      - name: account_name
        description: "Unique account identifier (e.g. ISA, SIPP). Natural/business key — stored as an attribute, not used for joins."
        tests:
          - not_null
          - unique
      - name: account_type
        description: "Regulatory product category: ISA, SIPP, GIA, etc. Use this column (not account_name) when filtering or grouping by product type across multiple providers."
        tests:
          - not_null
      - name: provider_id
        description: "Investment platform where the account is held (e.g. HL, VANGUARD). Foreign key to the providers source table."
        tests:
          - not_null
      - name: user_id
        description: "Owner of the account. Foreign key to the users table. Used to isolate data per user once authentication is enabled."
        tests:
          - not_null
      - name: account_open_date
        description: "Date of the account's first transaction, derived from base__hl_transactions. Null if no transactions have been recorded for the account."
        tests:
          - not_null
