version: 2

models:
  - name: fct_benchmarks_monthly
    description: >
      Periodic snapshot fact table recording the month-end index level for each benchmark.
      One row per (index_id, year_month), aggregated from daily closes in base__hl_benchmarks.

      **Table type**: Fact - periodic snapshot
      **Grain**: One row per (index_id, year_month)
      **Update Frequency**: Daily (after benchmark price ingest)
      **Source**: base__hl_benchmarks joined to dim_date
    example_query: |
      -- Raw month-end levels for all benchmarks (prefer mart_benchmarks_monthly for
      -- pre-computed returns and Sharpe ratios)
      SELECT fbm.index_id, fbm.year_month, dd.date AS month_end_date,
             fbm.month_end_level
      FROM fct_benchmarks_monthly fbm
      JOIN dim_date dd ON dd.date_key = fbm.date_key
      ORDER BY fbm.year_month DESC, fbm.index_id
      LIMIT 12

      -- All three benchmarks side-by-side for a given month
      SELECT year_month,
             MAX(CASE WHEN index_id = 'FTSE100' THEN month_end_level END) AS ftse100,
             MAX(CASE WHEN index_id = 'SP500'   THEN month_end_level END) AS sp500,
             MAX(CASE WHEN index_id = 'NASDAQ'  THEN month_end_level END) AS nasdaq
      FROM fct_benchmarks_monthly
      GROUP BY year_month
      ORDER BY year_month DESC
      LIMIT 12
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [index_id, year_month]
    columns:
      - name: date_key
        description: "Foreign key to dim_date.date_key for the last trading day of the month."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: index_id
        description: "Benchmark identifier: FTSE100, SP500, or NASDAQ. Degenerate dimension — no separate dim_benchmark exists."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [FTSE100, SP500, NASDAQ]
      - name: ticker
        description: "Yahoo Finance ticker used to source this series."
        tests:
          - not_null
      - name: year_month
        description: "YYYY-MM grouping key for the calendar month."
        tests:
          - not_null
      - name: month_end_level
        description: "Index closing level on the last trading day of the month (points)."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
