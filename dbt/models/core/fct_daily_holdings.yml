version: 2

models:
  - name: fct_daily_holdings
    description: >
      Periodic snapshot fact table recording daily portfolio holdings per account and fund.

      **Grain**: One row per (account_id, fund_id, valuation_date)
      **Update Frequency**: Daily (after price ingest)
      **Source**: int_daily_fund_values joined to int_fund_cost_basis, dim_account, dim_fund

      The GET /portfolio/holdings endpoint queries this filtered to the latest available
      price date. The daily grain allows drill-down into historical holding snapshots
      without recomputation. Portfolio weight (percentage) is not pre-computed here —
      it depends on the account filter applied at query time and is calculated as a
      window function in the API.
    columns:
      - name: account_key
        description: "Foreign key to dim_account.account_key."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_account')
                field: account_key
      - name: fund_key
        description: "Foreign key to dim_fund.fund_key."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_fund')
                field: fund_key
      - name: account_id
        description: "ISA or SIPP. Natural key retained for readability."
        tests:
          - not_null
      - name: fund_id
        description: "ISIN of the fund. Natural key retained for readability."
        tests:
          - not_null
      - name: fund_name
        description: "Human-readable fund name."
        tests:
          - not_null
      - name: valuation_date
        description: "Price date for this snapshot."
        tests:
          - not_null
      - name: units_held
        description: "Units held in this account on this date."
        tests:
          - not_null
      - name: price_gbp
        description: "NAV in GBP on this date."
        tests:
          - not_null
      - name: value_gbp
        description: "Market value in GBP (units_held × price_gbp)."
        tests:
          - not_null
      - name: cost_basis_gbp
        description: >
          Estimated cost basis from int_fund_cost_basis (total buy cost minus sale
          proceeds, floored at zero). Static — does not vary by date.
        tests:
          - not_null
      - name: unrealised_gain_gbp
        description: "value_gbp minus cost_basis_gbp."
        tests:
          - not_null
      - name: unrealised_gain_pct
        description: "Percentage gain relative to cost basis; 0.0 if cost basis is zero."
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [account_id, fund_id, valuation_date]
