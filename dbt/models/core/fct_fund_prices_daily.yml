version: 2

models:
  - name: fct_fund_prices_daily
    description: >
      Periodic snapshot fact table recording the end-of-day price for each fund.

      **Table type**: Fact - periodic snapshot
      **Grain**: One row per fund per day (fund_key, date_key)
      **Update Frequency**: Daily (after price ingest)
      **Source**: base__hl_prices joined to dim_date, dim_fund
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [fund_key, date_key]
    columns:
      - name: date_key
        description: "Foreign key to dim_date.date_key (YYYYMMDD integer)."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: fund_key
        description: "Foreign key to dim_fund.fund_key."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_fund')
                field: fund_key
      - name: fund_price_gbp
        description: "End-of-day Net Asset Value in GBP."
        tests:
          - not_null
