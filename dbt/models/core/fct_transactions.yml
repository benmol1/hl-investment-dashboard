version: 2

models:
  - name: fct_transactions
    description: >
      Atomic event fact table recording every HL investment transaction.

      **Table type**: Fact - transaction
      **Grain**: One row per transaction_id
      **Update Frequency**: Weekly (after ingest_transactions)
      **Source**: base__hl_transactions joined to dim_account and dim_fund
    example_query: |
      -- Recent transactions with human-readable names (standard 4-dim join pattern)
      SELECT dd.date        AS trade_date,
             da.account_name,
             df.fund_name,
             dtt.transaction_type,
             ft.quantity,
             ft.value_gbp
      FROM fct_transactions ft
      JOIN dim_date             dd  ON dd.date_key              = ft.trade_date_key
      JOIN dim_account          da  ON da.account_key           = ft.account_key
      LEFT JOIN dim_fund        df  ON df.fund_key              = ft.fund_key
      JOIN dim_transaction_type dtt ON dtt.transaction_type_key = ft.transaction_type_key
      WHERE dtt.transaction_type = 'BUY'
        AND da.account_name = 'ISA'
      ORDER BY dd.date DESC
      LIMIT 20

      -- Total fees paid per account (uses contribution_indicator to isolate fee rows)
      SELECT da.account_name,
             ROUND(SUM(ABS(ft.value_gbp)), 2) AS total_fees_gbp
      FROM fct_transactions ft
      JOIN dim_account          da  ON da.account_key           = ft.account_key
      JOIN dim_transaction_type dtt ON dtt.transaction_type_key = ft.transaction_type_key
      WHERE dtt.transaction_type = 'FEE'
      GROUP BY da.account_name
    columns:
      - name: transaction_id
        description: "MD5 of (account_id | trade_date | reference | value_gbp). Natural deduplication key — not a sequential integer surrogate."
        tests:
          - not_null
          - unique
      - name: account_key
        description: "Foreign key to dim_account.account_key."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_account')
                field: account_key
      - name: fund_key
        description: "Foreign key to dim_fund.fund_key. Null for non-trade rows (contributions, fees)."
        tests:
          - relationships:
              arguments:
                to: ref('dim_fund')
                field: fund_key
              config:
                where: "fund_key is not null"
      - name: transaction_type_key
        description: "Foreign key to dim_transaction_type.transaction_type_key."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_transaction_type')
                field: transaction_type_key
      - name: trade_date_key
        description: "Foreign key to dim_date.date_key for the trade execution date."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: settle_date_key
        description: "Foreign key to dim_date.date_key for the settlement date. Null when settlement date is unknown."
        tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
              config:
                where: "settle_date_key is not null"
      - name: transaction_reference
        description: "HL transaction reference string."
      - name: transaction_full_description
        description: "Raw description from the HL transaction export."
      - name: quantity
        description: "Number of units traded. Null for non-trade rows."
      - name: value_gbp
        description: "Transaction value in GBP. Negative = debit (purchase/fee); positive = credit."
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [transaction_id]
