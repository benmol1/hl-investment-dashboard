version: 2

models:
  - name: dim_account
    description: "Account dimension. One row per account (ISA, SIPP). account_key is the surrogate primary key; account_id is the natural key retained as an attribute."
    columns:
      - name: account_key
        description: "Sequential integer surrogate key. Use this for all joins between fact tables and dim_account."
        tests:
          - not_null
          - unique
      - name: account_id
        description: "Account identifier (ISA or SIPP). Natural/business key — stored as an attribute, not used for joins."
        tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: [ISA, SIPP]
