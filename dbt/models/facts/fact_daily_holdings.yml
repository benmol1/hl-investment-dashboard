version: 2

models:
  - name: fact_daily_holdings
    description: >
      Grain: one row per (account_id, fund_id, date).
      Periodic snapshot fact table. Daily holdings with cost basis and unrealised
      gain/loss per account and fund. The GET /portfolio/holdings endpoint queries
      this filtered to the latest available price date. The daily grain allows
      drill-down into historical holding snapshots without recomputation.
      Portfolio weight (percentage) is not pre-computed here — it depends on
      the account filter applied at query time and is calculated as a window
      function in the API.
    columns:
      - name: account_id
        description: "ISA or SIPP."
        tests:
          - not_null
      - name: fund_id
        description: "ISIN of the fund."
        tests:
          - not_null
      - name: fund_name
        description: "Human-readable fund name."
        tests:
          - not_null
      - name: valuation_date
        description: "Price date for this snapshot."
        tests:
          - not_null
      - name: units_held
        description: "Units held in this account on this date."
        tests:
          - not_null
      - name: price_gbp
        description: "NAV in GBP on this date."
        tests:
          - not_null
      - name: value_gbp
        description: "Market value in GBP (units_held × price_gbp)."
        tests:
          - not_null
      - name: cost_basis_gbp
        description: >
          Estimated cost basis from int_fund_cost_basis (total buy cost minus sale
          proceeds, floored at zero). Static — does not vary by date.
        tests:
          - not_null
      - name: unrealised_gain_gbp
        description: "value_gbp minus cost_basis_gbp."
        tests:
          - not_null
      - name: unrealised_gain_pct
        description: "Percentage gain relative to cost basis; 0.0 if cost basis is zero."
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [account_id, fund_id, valuation_date]
