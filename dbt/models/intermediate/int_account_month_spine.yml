version: 2

models:
  - name: int_account_month_spine
    description: >
      One row per (account, calendar month) from the account's first activity
      (earliest of first contribution or first portfolio value) through the
      current month. Used to drive month-level marts so that months with no
      transactions still appear in the output.
    columns:
      - name: account_id
        description: "ISA or SIPP."
        tests:
          - not_null
      - name: year_month
        description: "YYYY-MM string for the calendar month."
        tests:
          - not_null
      - name: financial_year
        description: "UK tax-year label (e.g. FY25 = April 2024 – March 2025)."
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [account_id, year_month]
