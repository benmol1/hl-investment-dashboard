version: 2

models:
  - name: int_cumulative_unit_balances
    description: >
      Running total of units held per (account, fund) as of each trade date.
      Sparse: only contains rows for dates when a trade occurred, not every
      calendar day. int_daily_unit_balances forward-fills this to every date
      via an ASOF JOIN. Ordered by (account_id, fund_id, trade_date) so the
      ASOF JOIN in the downstream model can find rows efficiently.
    columns:
      - name: account_id
        description: "ISA or SIPP."
        tests:
          - not_null
      - name: fund_id
        description: "ISIN of the fund."
        tests:
          - not_null
      - name: trade_date
        description: "Date of the most recent trade up to this point."
        tests:
          - not_null
      - name: units_held
        description: "Cumulative units held as of this trade date."
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [account_id, fund_id, trade_date]
