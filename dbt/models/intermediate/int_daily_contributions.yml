version: 2

models:
  - name: int_daily_contributions
    description: >
      Contributions per (account, date). Only contains dates
      on which a CONTRIBUTION transaction occurred.
      Contributions carry a positive value_gbp (money credited).
    columns:
      - name: account_id
        description: "ISA or SIPP."
        tests:
          - not_null
      - name: contribution_date
        description: "Date on which a contribution was received."
        tests:
          - not_null
      - name: contributed_today
        description: "Total contribution amount received on this date (GBP, positive)."
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [account_id, contribution_date]
