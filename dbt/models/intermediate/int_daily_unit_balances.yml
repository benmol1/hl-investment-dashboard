version: 2

models:
  - name: int_daily_unit_balances
    description: >
      Unit balance per (account, fund) for every calendar day from the first
      trade date to today. Uses a DuckDB ASOF JOIN to forward-fill the sparse
      trade-date balances from int_cumulative_unit_balances across the date
      spine in dim_date. Replaces the v_holdings view, which was not account-aware.
      Materialised as a table to avoid recomputing the ASOF JOIN on every
      downstream query.
    config:
      materialized: table
    columns:
      - name: valuation_date
        description: "Calendar date."
        tests:
          - not_null
      - name: account_id
        description: "ISA or SIPP."
        tests:
          - not_null
      - name: fund_id
        description: "ISIN of the fund."
        tests:
          - not_null
      - name: units_held
        description: "Units held in this account as of this date, forward-filled from the last trade."
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [account_id, fund_id, valuation_date]
