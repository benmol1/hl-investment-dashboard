version: 2

models:
  - name: mart_contributions_by_financial_year
    description: >
      New-money contributions per account per UK financial year (April–March).
      Transfers-in are excluded — only CONTRIBUTION transactions (which count against
      the annual ISA/SIPP allowance) are included.

      **Grain**: One row per (account_name, financial_year)
      **Update Frequency**: Daily (after price ingest)
      **Source**: fct_transactions filtered to contribution_indicator = 'Contribution'
    example_query: |
      -- All years, both accounts, newest first
      SELECT financial_year, account_name, contributions_gbp
      FROM mart_contributions_by_financial_year
      ORDER BY financial_year DESC, account_name

      -- Combined ISA + SIPP total per year
      SELECT financial_year, SUM(contributions_gbp) AS total_contributions_gbp
      FROM mart_contributions_by_financial_year
      GROUP BY financial_year
      ORDER BY financial_year DESC
    columns:
      - name: account_name
        description: "ISA or SIPP."
        tests:
          - not_null
      - name: financial_year
        description: "UK financial year label, e.g. 2023/24 (April 2023 – March 2024)."
        tests:
          - not_null
      - name: contributions_gbp
        description: "New-money deposited into this account in this financial year. Counts against the annual ISA/SIPP allowance. Excludes transfers-in."
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [account_name, financial_year]
