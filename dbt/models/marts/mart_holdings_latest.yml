version: 2

models:
  - name: mart_holdings_latest
    description: >
      Snapshot of latest holdings per account — fund and cash positions as of the most recent
      price date, with cost basis and unrealised gain.

      **Grain**: One row per (account_name, holding_type, fund_name)
      **Update Frequency**: Daily (after ingest_prices)
      **Source**: fct_holdings_daily, fct_transactions, dim_account, dim_fund, dim_transaction_type

      Includes both fund and cash positions. Cost basis is calculated as total buy cost
      (BUY + SWITCH_IN) minus total sell proceeds (SELL + SWITCH_OUT), floored at zero —
      fund positions only; cash rows have cost_basis_gbp = 0. Unrealised gain and gain
      percentage are null for cash rows. weight_pct is each holding's share of the
      account's total value including cash.
    columns:
      - name: account_name
        description: "ISA or SIPP."
        tests:
          - not_null
      - name: holding_type
        description: "Fund or Cash."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [Fund, Cash]
      - name: fund_name
        description: "Full fund name from dim_fund. Null for cash rows."
      - name: valuation_date
        description: "Most recent date for which price data exists."
        tests:
          - not_null
      - name: units_held
        description: "Number of units held as of valuation_date. Null for cash rows."
      - name: fund_price_gbp
        description: "NAV price per unit in GBP as of valuation_date. Null for cash rows."
      - name: value_gbp
        description: "Market value of the holding in GBP."
        tests:
          - not_null
      - name: cost_basis_gbp
        description: "Total amount invested minus proceeds from any sales, in GBP. Floored at zero. Zero for cash rows."
      - name: unrealised_gain_gbp
        description: "value_gbp minus cost_basis_gbp. Null for cash rows."
      - name: unrealised_gain_pct
        description: "Unrealised gain as a percentage of cost basis. Zero when cost basis is zero. Null for cash rows."
      - name: weight_pct
        description: "Holding value as a percentage of the account's total portfolio value (including cash)."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [account_name, holding_type, fund_name]
