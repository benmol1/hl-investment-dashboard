version: 2

models:
  - name: mart_monthly_portfolio_value
    description: >
      One row per (account, calendar month) from account opening through the
      current month, driven by int_account_month_spine. Months before the first
      fund price will have null month_end_value_gbp and cumulative_contributions_gbp.
      year_month and financial_year are sourced from the spine.
    columns:
      - name: account_id
        description: "ISA or SIPP."
        tests:
          - not_null
      - name: year_month
        description: "YYYY-MM string for the calendar month (e.g. 2024-03)."
        tests:
          - not_null
      - name: financial_year
        description: "UK tax-year label (e.g. FY25 = April 2024 – March 2025)."
        tests:
          - not_null
      - name: month_end_date
        description: "Actual last trading day with data in the month. Null for months before first portfolio value."
      - name: month_end_value_gbp
        description: "Total market value of the portfolio on the month-end date. Null for months before first portfolio value."
      - name: cumulative_contributions_gbp
        description: "Running total of all contributions up to and including the month-end date. Null for months before first portfolio value."
      - name: month_total_contributions_gbp
        description: "Total contributions made within the calendar month. Null for months with no contributions."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [account_id, year_month]
