version: 2

models:
  - name: mart_monthly_snapshot
    description: >
      One row per (account, calendar month) from account opening through the
      current month. Spine is driven by dim_account.account_open_date joined to
      dim_date.

      month_end_value_gbp reflects total portfolio value including cash holdings
      (funds + cash), sourced from fct_daily_holdings on dates where
      dim_date.month_end_indicator = 'Month End'. The current (incomplete) month
      will show null for month_end_date and month_end_value_gbp until its last
      calendar day passes.

      Contributions and fund purchases are sourced from fct_transactions,
      classified via dim_transaction_type.

      **Grain**: One row per (account_id, year_month)
      **Update Frequency**: Daily
      **Sources**: fct_daily_holdings, fct_transactions, dim_account, dim_date, dim_transaction_type
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [account_id, year_month]
    columns:
      - name: account_id
        description: "ISA or SIPP."
        tests:
          - not_null
      - name: year_month
        description: "YYYY-MM string for the calendar month (e.g. 2024-03)."
        tests:
          - not_null
      - name: financial_year
        description: "UK tax-year label (e.g. FY25 = April 2024 – March 2025)."
        tests:
          - not_null
      - name: month_end_date
        description: >
          Last calendar day of the month, sourced from dim_date where
          month_end_indicator = 'Month End'. Null for the current incomplete
          month and for months before the first holding.
      - name: month_end_value_gbp
        description: "Total market value of all holdings (funds + cash) on the month-end date. Null for the current incomplete month and for months before the first holding."
      - name: cumulative_contributions_gbp
        description: "Running total of all contributions up to and including the given year_month. Zero for months before any contributions have been made."
      - name: month_total_contributions_gbp
        description: "Total contributions made within the calendar month. Zero for months with no contributions."
      - name: net_fund_purchases_gbp
        description: >
          Gross fund buys minus gross fund sells within the calendar month.
          Positive = net buyer, negative = net seller. Zero for months with no
          trades. Differs from month_total_contributions_gbp because cash can
          sit uninvested between contribution and deployment.
