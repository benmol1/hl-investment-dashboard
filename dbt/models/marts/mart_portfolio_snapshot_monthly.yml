version: 2

models:
  - name: mart_portfolio_snapshot_monthly
    description: >
      One row per (account, calendar month) from account opening through the
      last completed month. Spine is driven by dim_account.account_open_date
      joined to dim_date.

      month_end_value_gbp reflects total portfolio value including cash holdings
      (funds + cash), sourced from fct_holdings_daily on dates where
      dim_date.month_end_indicator = 'Month End'.

      Inflows (contributions + transfers) and fund purchases are sourced from fct_transactions,
      classified via dim_transaction_type.

      **Grain**: One row per (account_name, year_month)
      **Update Frequency**: Daily
      **Sources**: fct_holdings_daily, fct_transactions, dim_account, dim_date, dim_transaction_type
    example_query: |
      -- Last 24 months of monthly summaries for one account
      SELECT account_name, year_month, financial_year,
             month_end_value_gbp, monthly_inflows_gbp, monthly_net_fund_purchases_gbp
      FROM mart_portfolio_snapshot_monthly
      WHERE account_name = 'ISA'
      ORDER BY year_month DESC
      LIMIT 24
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [account_name, year_month]
    columns:
      - name: account_name
        description: "ISA or SIPP."
        tests:
          - not_null
      - name: year_month
        description: "YYYY-MM string for the calendar month (e.g. 2024-03)."
        tests:
          - not_null
      - name: financial_year
        description: "UK tax-year label (e.g. FY25 = April 2024 – March 2025)."
        tests:
          - not_null
      - name: month_end_date
        description: >
          Last calendar day of the month, sourced from dim_date where
          month_end_indicator = 'Month End'. Null for months before the first
          holding.
      - name: month_end_value_gbp
        description: "Total market value of all holdings (funds + cash) on the month-end date. Null for months before the first holding."
      - name: monthly_inflows_gbp
        description: "Total inflows (contributions + transfers) received within the calendar month. Zero for months with no inflows."
      - name: monthly_net_fund_purchases_gbp
        description: >
          Gross fund buys minus gross fund sells within the calendar month.
          Positive = net buyer, negative = net seller. Zero for months with no
          trades. Differs from monthly_inflows_gbp because cash can
          sit uninvested between inflow and deployment.
