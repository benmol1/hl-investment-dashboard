version: 2

models:
  - name: mart_portfolio_value_daily
    description: >
      Daily total portfolio value per account — the sum of all fund values for a
      given account on a given date.

      **Grain**: One row per (account_name, valuation_date)
      **Update Frequency**: Daily (after price ingest)
      **Source**: fct_holdings_daily joined to dim_account, dim_date

      The API queries this with an optional account_name filter and a date range;
      for the "All accounts" view it sums across both ISA and SIPP.
    example_query: |
      -- Single account over a date range
      SELECT valuation_date, portfolio_value_gbp
      FROM mart_portfolio_value_daily
      WHERE account_name = 'ISA'
        AND valuation_date >= '2024-01-01'
      ORDER BY valuation_date

      -- Combined value across both accounts on each date
      SELECT valuation_date, SUM(portfolio_value_gbp) AS total_value_gbp
      FROM mart_portfolio_value_daily
      GROUP BY valuation_date
      ORDER BY valuation_date
    columns:
      - name: account_name
        description: "ISA or SIPP."
        tests:
          - not_null
      - name: valuation_date
        description: "Price date."
        tests:
          - not_null
      - name: portfolio_value_gbp
        description: "Total market value of all funds held in this account on this date (GBP)."
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [account_name, valuation_date]
