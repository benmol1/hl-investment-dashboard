version: 2

models:
  - name: stg_benchmarks
    description: >
      Daily closing levels for the three benchmark indices (FTSE 100, S&P 500, Nasdaq)
      sourced from yfinance. The absolute level is stored here; the API applies the
      indexed-to-100 calculation at query time since the base date varies per request.
    columns:
      - name: index_id
        description: "Benchmark identifier: FTSE100, SP500, or NASDAQ."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [FTSE100, SP500, NASDAQ]
      - name: date
        description: "Market date."
        tests:
          - not_null
      - name: level
        description: "Index closing level (points)."
        tests:
          - not_null
      - name: ticker
        description: "Yahoo Finance ticker used to fetch this series (^FTSE, ^GSPC, ^IXIC)."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [index_id, date]
