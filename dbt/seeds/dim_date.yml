version: 2

seeds:
  - name: dim_date
    description: "Date dimension table covering 2016 onwards, with UK financial year grouping."
    columns:
      - name: date_key
        description: "Integer surrogate key in YYYYMMDD format (e.g. 20240101). Kimball standard for date dimensions."
        tests:
          - not_null
          - unique
      - name: date
        description: "Calendar date (ISO 8601). Natural key."
        tests:
          - not_null
          - unique
      - name: year
        description: "Calendar year (e.g. 2024)."
        tests:
          - not_null
      - name: month
        description: "Month number 1–12."
        tests:
          - not_null
      - name: day
        description: "Day of month 1–31."
        tests:
          - not_null
      - name: year_month
        description: "YYYY-MM string, for month-level grouping."
        tests:
          - not_null
      - name: financial_year
        description: >
          UK tax-year label (e.g. FY17 = April 2016 – March 2017).
          Useful for grouping contributions and gains by tax year.
        tests:
          - not_null
      - name: month_end_indicator
        description: "Set to 'Month End' on the last calendar day of each month, otherwise empty."
        tests:
          - dbt_utils.expression_is_true:
              expression: "month_end_indicator = 'Month End'"
              where: "date = '2019-02-28'"
      - name: financial_year_end_indicator
        description: "Set to 'Financial Year End' on 31 March each year (the last day of the UK tax year), otherwise empty."
        tests:
          - dbt_utils.expression_is_true:
              expression: "financial_year_end_indicator = 'Financial Year End'"
              where: "date = '2025-03-31'"
