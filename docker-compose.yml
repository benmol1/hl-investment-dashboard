x-localtime: &localtime /etc/localtime:/etc/localtime:ro

services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    volumes:
      - ${DATA_DIR:-/srv/hl-dashboard/data}:/app/data
      - *localtime

  cron:
    build:
      context: .
      dockerfile: cron/Dockerfile
    restart: unless-stopped
    volumes:
      - ${DATA_DIR:-/srv/hl-dashboard/data}:/app/data
      - *localtime
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - HL_USERNAME=${HL_USERNAME}
      - HL_PASSWORD=${HL_PASSWORD}
      - HL_SECURE_NUMBER=${HL_SECURE_NUMBER}
      - HL_ISA_ACCOUNT_ID=${HL_ISA_ACCOUNT_ID}
      - HL_SIPP_ACCOUNT_ID=${HL_SIPP_ACCOUNT_ID}

  bot:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    volumes:
      - ${DATA_DIR:-/srv/hl-dashboard/data}:/app/data
      - *localtime
    command: ["/app/.venv/bin/python", "-m", "backend.bot"]
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-haiku-4-5-20251001}

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "2048:80"
    volumes:
      - *localtime
    depends_on:
      - backend
